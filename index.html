<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SZN Capital — Free Training Replay</title>
<meta name="description" content="Watch the SZN Capital free training replay. Apply to join SZN Academy for the next step." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#000000;
    --card:#101113;
    --card-2:#0c0d0f;
    --border:rgba(255,255,255,0.07);
    --accent:#7830ff;
    --accent-soft:rgba(120,48,255,0.5);
    --text:#ffffff;
    --muted:#878787;
    --muted-3:rgba(255,255,255,0.4);
    --serif:"Libre Baskerville",Georgia,serif;
    --sans:"Inter",system-ui,-apple-system,sans-serif;
    --maxw:1060px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    line-height:1.5;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--accent);color:#fff}
  a{color:inherit;text-decoration:none}

  .wrap{max-width:var(--maxw);margin-inline:auto;padding-inline:24px}

  .hero{
    padding-block:clamp(56px,7vw,96px) clamp(72px,9vw,120px);
    text-align:center;
    background:radial-gradient(120% 70% at 50% -8%,rgba(120,48,255,0.18),transparent 60%);
    min-height:100vh;
  }
  .hero-inner{max-width:1100px;margin-inline:auto;display:flex;flex-direction:column;align-items:center}

  h1.hero-title{
    font-family:var(--serif);font-weight:700;
    font-size:clamp(26px,4vw,44px);
    line-height:1.14;letter-spacing:-0.02em;
    text-wrap:balance;
  }
  h1.hero-title em{font-style:normal;color:var(--accent)}

  .hero-sub{
    margin-top:clamp(18px,2.2vw,26px);
    font-size:clamp(15px,1.6vw,18px);font-weight:500;letter-spacing:-0.02em;
    color:var(--muted);max-width:820px;line-height:1.5;text-wrap:balance;
  }

  .video{
    width:100%;max-width:820px;
    margin-top:clamp(24px,3vw,40px);
    aspect-ratio:16/9;
    border-radius:14px;
    overflow:hidden;
    border:1px solid var(--border);
    background:#0a0b0d;
    box-shadow:
      0 30px 80px -32px rgba(120,48,255,0.35),
      0 1px 0 0 rgba(255,255,255,0.03) inset;
  }
  .video iframe{width:100%;height:100%;border:0;display:block}

  .next-step{
    margin-top:clamp(32px,4vw,52px);
    font-size:clamp(17px,1.9vw,23px);font-weight:600;letter-spacing:-0.02em;
    color:#fff;text-wrap:balance;
  }
  .next-step b{color:var(--accent);font-weight:700}

  .cta{
    margin-top:clamp(20px,2.4vw,28px);
    display:inline-flex;align-items:center;justify-content:center;gap:10px;
    padding:0 30px;height:54px;
    border-radius:999px;
    background:linear-gradient(180deg,#9558ff 0%,#7830ff 100%);
    color:#fff;font-family:var(--sans);font-weight:600;
    font-size:clamp(14px,1.4vw,16px);letter-spacing:0.025em;
    box-shadow:
      0 0 0 1px rgba(120,48,255,0.55),
      0 0 44px -2px rgba(120,48,255,0.65),
      0 22px 56px -16px rgba(120,48,255,0.7),
      inset 0 1px 0 0 rgba(255,255,255,0.20);
    transition:transform .15s,box-shadow .25s,filter .2s;
  }
  .cta:hover{
    transform:translateY(-1px);
    filter:brightness(1.06);
    box-shadow:
      0 0 0 1px rgba(120,48,255,0.65),
      0 0 44px -2px rgba(120,48,255,0.85),
      0 22px 56px -16px rgba(120,48,255,0.85),
      inset 0 1px 0 0 rgba(255,255,255,0.25);
  }
  .cta:focus-visible{outline:none;box-shadow:
      0 0 0 3px rgba(120,48,255,0.4),
      0 0 0 1px rgba(120,48,255,0.65),
      0 0 44px -2px rgba(120,48,255,0.85)}
  .cta:active{transform:translateY(0)}
  .cta .arr{font-size:1.05em;transform:translateY(-1px)}

  .foot-note{
    margin-top:clamp(26px,3vw,34px);
    font-size:clamp(13px,1.3vw,15px);font-weight:500;letter-spacing:-0.015em;
    color:var(--muted);
  }

  @media (max-width:640px){
    .hero{padding-block:48px 64px}
    .video{border-radius:12px}
    .cta{height:50px;padding:0 24px}
  }
</style>
</head>
<body>

  <section class="hero">
    <div class="wrap hero-inner">

      <h1 class="hero-title"><em>SZN</em> Capital Free Training Replay</h1>

      <p class="hero-sub">
        Walkthrough of the trading model getting FX traders funded on NQ in under 60 days
      </p>

      <div class="video">
        <iframe
          src="https://player.vimeo.com/video/1201376727?badge=0&autopause=0&player_id=0&app_id=58479"
          frameborder="0"
          allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share"
          referrerpolicy="strict-origin-when-cross-origin"
          title="SZN Capital Free Training Replay"
          allowfullscreen></iframe>
      </div>
      <script src="https://player.vimeo.com/api/player.js"></script>

      <p class="next-step"><b>Next Step:</b> Apply to be a part of SZN Academy</p>

      <a class="cta" href="#" target="_blank" rel="noopener">
        SZN ACADEMY <span class="arr">➤</span>
      </a>

      <p class="foot-note">Limited spots. Live coaching + members-only model.</p>

    </div>
  </section>

</body>
</html>
